<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Yahtzee Calculator</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --accent-dim: rgba(34, 211, 238, 0.15);
      --good: #4ade80;
      --warn: #fbbf24;
      --bad: #f87171;
      --locked: #64748b;
      --tap: rgba(255, 255, 255, 0.06);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.4;
      overscroll-behavior: none;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) 12px max(20px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 20px;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .total {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 18px;
      color: var(--accent);
    }

    /* Dice row */
    .dice {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .die {
      aspect-ratio: 1 / 1;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
      padding: 18%;
      cursor: pointer;
      user-select: none;
      transition: transform 80ms ease, border-color 120ms ease, background 120ms ease;
      touch-action: manipulation;
    }
    .die:active { transform: scale(0.94); }
    .die.held {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .pip {
      background: var(--text);
      border-radius: 50%;
      width: 100%;
      height: 100%;
      visibility: hidden;
    }
    .pip.on { visibility: visible; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }
    .btn {
      padding: 14px 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 120ms;
    }
    .btn:active { opacity: 0.7; }
    .btn-roll {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-roll:disabled {
      background: var(--surface-2);
      color: var(--muted);
      cursor: not-allowed;
    }
    .btn-reset {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .roll-info {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: -4px;
    }

    /* Scorecard */
    .section {
      margin-bottom: 16px;
    }
    .section h2 {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 8px;
      padding-left: 4px;
    }
    .scorecard {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--surface-2);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 120ms;
    }
    .row:last-child { border-bottom: none; }
    .row.lockable:active { background: var(--tap); }
    .row.locked {
      cursor: default;
      opacity: 0.85;
    }
    .row.suggested {
      background: rgba(74, 222, 128, 0.08);
    }
    .row.subtotal {
      cursor: default;
      background: var(--surface-2);
      font-weight: 600;
    }
    .label {
      font-size: 14px;
    }
    .label .desc {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .score {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 16px;
      min-width: 56px;
      text-align: right;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .score.preview {
      color: var(--good);
      background: rgba(74, 222, 128, 0.12);
    }
    .score.zero-preview {
      color: var(--bad);
      background: rgba(248, 113, 113, 0.10);
    }
    .score.locked {
      color: var(--locked);
      background: transparent;
      cursor: pointer;
    }
    .score.locked:active { background: var(--tap); }
    .score.empty {
      color: var(--muted);
      font-weight: 400;
      font-style: italic;
    }
    .score.bonus-progress {
      color: var(--warn);
      font-size: 13px;
    }
    .score.bonus-earned {
      color: var(--good);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding-top: 8px;
    }
    .footer a { color: var(--muted); }

    /* Tap to clear hint */
    .clear-hint {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
      margin-top: 6px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Yahtzee</h1>
      <div class="total" data-testid="grand-total">0</div>
    </header>

    <div class="dice" id="dice" aria-label="Five dice. Tap a die to hold it between rolls."></div>

    <div class="controls">
      <button class="btn btn-roll" id="roll" data-testid="btn-roll">Roll (3)</button>
      <button class="btn btn-reset" id="new-game" data-testid="btn-new-game">New Game</button>
      <div class="roll-info" id="roll-info">Tap a die to hold it. Tap a row to lock the score.</div>
    </div>

    <div class="section">
      <h2>Upper Section</h2>
      <div class="scorecard" id="upper"></div>
    </div>

    <div class="section">
      <h2>Lower Section</h2>
      <div class="scorecard" id="lower"></div>
    </div>

    <p class="clear-hint">Long-press a locked score to clear it.</p>
    <div class="footer">
      Yahtzee scoring · works offline · <a href="https://github.com/Rio517/yahtzee-calculator">source</a>
    </div>
  </div>

  <script>
    // ── Game state ─────────────────────────────────────────────────────
    const STORAGE_KEY = "yahtzee-calc-v1";

    const initialState = () => ({
      dice: [1, 1, 1, 1, 1],
      held: [false, false, false, false, false],
      rollsLeft: 3,
      // Scorecard: null = empty, number = locked score
      scores: {
        ones: null, twos: null, threes: null, fours: null, fives: null, sixes: null,
        threeKind: null, fourKind: null, fullHouse: null,
        smallStraight: null, largeStraight: null, yahtzee: null, chance: null,
      },
      yahtzeeBonusCount: 0,
    });

    let state = loadState() || initialState();

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }
    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
    }

    // ── Score calculations ─────────────────────────────────────────────
    const upperKey = (n) => ["ones","twos","threes","fours","fives","sixes"][n - 1];
    const isYahtzee = (dice) => new Set(dice).size === 1;

    function counts(dice) {
      const c = {};
      for (const d of dice) c[d] = (c[d] || 0) + 1;
      return c;
    }
    function sum(dice) { return dice.reduce((a, b) => a + b, 0); }

    function scoreUpper(dice, n) {
      return dice.filter(d => d === n).length * n;
    }
    function scoreNKind(dice, n) {
      const c = counts(dice);
      return Object.values(c).some(v => v >= n) ? sum(dice) : 0;
    }
    function scoreFullHouse(dice) {
      const vals = Object.values(counts(dice)).sort();
      // Joker rule: a Yahtzee also counts as a full house when upper section is filled.
      if (vals.length === 1) return 25;
      return (vals.length === 2 && vals[0] === 2 && vals[1] === 3) ? 25 : 0;
    }
    function scoreStraight(dice, len) {
      const uniq = [...new Set(dice)].sort((a, b) => a - b);
      let run = 1, best = 1;
      for (let i = 1; i < uniq.length; i++) {
        run = (uniq[i] === uniq[i - 1] + 1) ? run + 1 : 1;
        best = Math.max(best, run);
      }
      if (len === 4) return best >= 4 ? 30 : 0;
      if (len === 5) return best >= 5 ? 40 : 0;
      return 0;
    }
    function scoreYahtzee(dice) { return isYahtzee(dice) ? 50 : 0; }
    function scoreChance(dice) { return sum(dice); }

    function previewFor(key, dice) {
      switch (key) {
        case "ones": return scoreUpper(dice, 1);
        case "twos": return scoreUpper(dice, 2);
        case "threes": return scoreUpper(dice, 3);
        case "fours": return scoreUpper(dice, 4);
        case "fives": return scoreUpper(dice, 5);
        case "sixes": return scoreUpper(dice, 6);
        case "threeKind": return scoreNKind(dice, 3);
        case "fourKind": return scoreNKind(dice, 4);
        case "fullHouse": return scoreFullHouse(dice);
        case "smallStraight": return scoreStraight(dice, 4);
        case "largeStraight": return scoreStraight(dice, 5);
        case "yahtzee": return scoreYahtzee(dice);
        case "chance": return scoreChance(dice);
      }
    }

    function upperSubtotal() {
      return ["ones","twos","threes","fours","fives","sixes"]
        .reduce((acc, k) => acc + (state.scores[k] || 0), 0);
    }
    function upperBonus() { return upperSubtotal() >= 63 ? 35 : 0; }
    function yahtzeeBonus() { return state.yahtzeeBonusCount * 100; }
    function lowerSubtotal() {
      return ["threeKind","fourKind","fullHouse","smallStraight","largeStraight","yahtzee","chance"]
        .reduce((acc, k) => acc + (state.scores[k] || 0), 0) + yahtzeeBonus();
    }
    function grandTotal() {
      return upperSubtotal() + upperBonus() + lowerSubtotal();
    }

    function diceFresh() {
      // The dice are "rolled" if rollsLeft has been decremented at least once.
      // At start of turn (rollsLeft === 3), they're not yet rolled.
      return state.rollsLeft < 3;
    }

    function gameOver() {
      return Object.values(state.scores).every(v => v !== null);
    }

    // ── Rendering ──────────────────────────────────────────────────────
    const PIP_LAYOUTS = {
      1: [4],
      2: [0, 8],
      3: [0, 4, 8],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8],
    };

    function renderDice() {
      const root = document.getElementById("dice");
      root.innerHTML = "";
      state.dice.forEach((value, i) => {
        const die = document.createElement("button");
        die.className = "die" + (state.held[i] ? " held" : "");
        die.setAttribute("type", "button");
        die.setAttribute("data-testid", `die-${i}`);
        die.setAttribute("aria-label", `Die ${i + 1} showing ${value}${state.held[i] ? ", held" : ""}`);
        die.disabled = !diceFresh();
        for (let p = 0; p < 9; p++) {
          const pip = document.createElement("span");
          pip.className = "pip" + (PIP_LAYOUTS[value].includes(p) ? " on" : "");
          die.appendChild(pip);
        }
        die.addEventListener("click", () => {
          if (!diceFresh()) return;
          state.held[i] = !state.held[i];
          saveState(); render();
        });
        root.appendChild(die);
      });
    }

    function renderControls() {
      const rollBtn = document.getElementById("roll");
      const info = document.getElementById("roll-info");
      const over = gameOver();
      rollBtn.disabled = state.rollsLeft === 0 || over;
      rollBtn.textContent = over ? "Game Over" : `Roll (${state.rollsLeft})`;

      if (over) {
        info.textContent = `Final score: ${grandTotal()}. Tap "New Game" to play again.`;
      } else if (!diceFresh()) {
        info.textContent = `Tap dice to hold. ${state.rollsLeft} rolls left this turn.`;
      } else if (state.rollsLeft === 3) {
        info.textContent = "Tap roll to start your turn.";
      } else {
        info.textContent = "Tap roll for next turn.";
      }
    }

    const ROWS = {
      upper: [
        { key: "ones", label: "Ones", desc: "Sum of 1s" },
        { key: "twos", label: "Twos", desc: "Sum of 2s" },
        { key: "threes", label: "Threes", desc: "Sum of 3s" },
        { key: "fours", label: "Fours", desc: "Sum of 4s" },
        { key: "fives", label: "Fives", desc: "Sum of 5s" },
        { key: "sixes", label: "Sixes", desc: "Sum of 6s" },
      ],
      lower: [
        { key: "threeKind", label: "3 of a Kind", desc: "Sum of all dice" },
        { key: "fourKind", label: "4 of a Kind", desc: "Sum of all dice" },
        { key: "fullHouse", label: "Full House", desc: "25 points" },
        { key: "smallStraight", label: "Small Straight", desc: "4 in a row · 30 pts" },
        { key: "largeStraight", label: "Large Straight", desc: "5 in a row · 40 pts" },
        { key: "yahtzee", label: "Yahtzee", desc: "5 of a kind · 50 pts" },
        { key: "chance", label: "Chance", desc: "Sum of all dice" },
      ],
    };

    function renderScorecard(sectionKey) {
      const root = document.getElementById(sectionKey);
      root.innerHTML = "";
      const rows = ROWS[sectionKey];
      const showPreviews = diceFresh() && !gameOver();
      const previews = showPreviews
        ? rows.map(r => ({ key: r.key, value: previewFor(r.key, state.dice) }))
        : [];
      // Find top suggestion (highest non-zero preview among unlocked rows).
      let topPreview = null;
      if (showPreviews) {
        const unlocked = previews.filter(p => state.scores[p.key] === null && p.value > 0);
        if (unlocked.length > 0) {
          topPreview = unlocked.reduce((a, b) => b.value > a.value ? b : a);
        }
      }

      for (const r of rows) {
        const locked = state.scores[r.key] !== null;
        const preview = showPreviews ? previewFor(r.key, state.dice) : null;
        const row = document.createElement("div");
        row.className = "row" + (locked ? " locked" : " lockable") +
          (topPreview && topPreview.key === r.key ? " suggested" : "");
        row.setAttribute("data-testid", `row-${r.key}`);

        const label = document.createElement("div");
        label.className = "label";
        label.innerHTML = `${r.label}<span class="desc">${r.desc}</span>`;
        row.appendChild(label);

        const score = document.createElement("div");
        if (locked) {
          score.className = "score locked";
          score.textContent = state.scores[r.key];
          score.setAttribute("title", "Tap to clear (long-press)");
          attachLongPress(score, () => clearScore(r.key));
        } else if (showPreviews && preview > 0) {
          score.className = "score preview";
          score.textContent = preview;
        } else if (showPreviews && preview === 0) {
          score.className = "score zero-preview";
          score.textContent = "0";
        } else {
          score.className = "score empty";
          score.textContent = "—";
        }
        row.appendChild(score);

        if (!locked && showPreviews) {
          row.addEventListener("click", (e) => {
            if (e.target === score && score.classList.contains("locked")) return;
            lockScore(r.key, preview);
          });
        }
        root.appendChild(row);
      }

      if (sectionKey === "upper") {
        appendSubtotalRow(root, "Subtotal", upperSubtotal(), false);
        const bonus = upperBonus();
        if (bonus === 35) {
          appendSubtotalRow(root, "Bonus (≥63)", 35, false, "bonus-earned");
        } else {
          const need = Math.max(0, 63 - upperSubtotal());
          appendSubtotalRow(root, "Bonus (≥63)", `+${need} to go`, false, "bonus-progress");
        }
      } else {
        if (state.yahtzeeBonusCount > 0) {
          appendSubtotalRow(root, `Yahtzee Bonus ×${state.yahtzeeBonusCount}`, yahtzeeBonus(), false, "bonus-earned");
        }
        appendSubtotalRow(root, "Subtotal", lowerSubtotal(), false);
      }
    }

    function appendSubtotalRow(root, label, value, _, scoreClass = "") {
      const row = document.createElement("div");
      row.className = "row subtotal";
      const lab = document.createElement("div");
      lab.className = "label";
      lab.textContent = label;
      const sc = document.createElement("div");
      sc.className = "score " + scoreClass;
      sc.textContent = value;
      row.appendChild(lab);
      row.appendChild(sc);
      root.appendChild(row);
    }

    function attachLongPress(el, fn) {
      let timer = null;
      const start = (e) => {
        e.preventDefault();
        timer = setTimeout(() => { timer = null; fn(); }, 600);
      };
      const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
      el.addEventListener("touchstart", start, { passive: false });
      el.addEventListener("touchend", cancel);
      el.addEventListener("touchcancel", cancel);
      el.addEventListener("touchmove", cancel);
      el.addEventListener("mousedown", start);
      el.addEventListener("mouseup", cancel);
      el.addEventListener("mouseleave", cancel);
    }

    function renderTotal() {
      document.querySelector(".total").textContent = grandTotal();
    }

    function render() {
      renderDice();
      renderControls();
      renderScorecard("upper");
      renderScorecard("lower");
      renderTotal();
    }

    // ── Actions ────────────────────────────────────────────────────────
    function rollDice() {
      if (state.rollsLeft === 0 || gameOver()) return;
      for (let i = 0; i < 5; i++) {
        if (!state.held[i] || state.rollsLeft === 3) {
          state.dice[i] = 1 + Math.floor(Math.random() * 6);
        }
      }
      state.rollsLeft--;
      saveState(); render();
    }

    function lockScore(key, value) {
      // Yahtzee bonus: any subsequent Yahtzee roll while the Yahtzee box
      // is already filled with 50 awards 100 bonus points (per round).
      if (isYahtzee(state.dice) && state.scores.yahtzee === 50 && key !== "yahtzee") {
        state.yahtzeeBonusCount++;
      }
      state.scores[key] = value;
      // Reset for next turn.
      state.rollsLeft = 3;
      state.held = [false, false, false, false, false];
      saveState(); render();
    }

    function clearScore(key) {
      if (state.scores[key] === null) return;
      if (!confirm(`Clear "${key}" score?`)) return;
      state.scores[key] = null;
      saveState(); render();
    }

    function newGame() {
      if (Object.values(state.scores).some(v => v !== null) &&
          !confirm("Start a new game? Current scores will be lost.")) return;
      state = initialState();
      saveState(); render();
    }

    document.getElementById("roll").addEventListener("click", rollDice);
    document.getElementById("new-game").addEventListener("click", newGame);

    // Service-worker-free; just respond to visibility for the resume case.
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) render();
    });

    render();
  </script>
</body>
</html>
